services:
  site:
    build: .
    ports:
      - "4000:4000"
      - "35729:35729"
    environment:
      JEKYLL_ENV: development
    volumes:
      - .:/srv/jekyll
      - bundle_cache:/usr/local/bundle

  arcade:
    build: ./arcade
    ports:
      - "4321:4321"
    volumes:
      - ./arcade:/srv/arcade
      - arcade_node_modules:/srv/arcade/node_modules

volumes:
  bundle_cache:
  arcade_node_modules:
