services:
  site:
    build: .
    ports:
      - "4000:4000"
      - "35729:35729"
    environment:
      JEKYLL_ENV: development
    volumes:
      - .:/srv/jekyll
      - bundle_cache:/usr/local/bundle

  arcade:
    build: ./arcade
    ports:
      - "4321:4321"
    volumes:
      - ./arcade:/srv/arcade
      - arcade_node_modules:/srv/arcade/node_modules

  # One-shot index (used by scripts/docker-index-search.sh). Not started by plain `docker compose up`.
  pagefind:
    image: node:22-bookworm-slim
    working_dir: /work
    volumes:
      - .:/work
    command: ["sh", "-c", "npm ci && npm run pagefind"]
    profiles:
      - index

  # Runs after Jekyll has HTML in _site/, writes _site/pagefind/ (blog search). Re-indexes on HTML changes.
  pagefind-watch:
    image: node:22-bookworm-slim
    working_dir: /work
    volumes:
      - .:/work
    depends_on:
      - site
    command: ["sh", "/work/scripts/pagefind-watch-entry.sh"]

volumes:
  bundle_cache:
  arcade_node_modules:
