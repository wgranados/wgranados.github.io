<!DOCTYPE html>
<html lang="en">
{% include head-default.html %}

<body class="home-body">
    <main>
        <div class="container home-page">
            <section class="home-hero" aria-label="Introduction">
                <div class="home-hero-visual">
                    <img class="home-hero-img"
                        src="{{ '/images/wgma_teemo_aesthetic_one.jpg' | relative_url }}"
                        width="800"
                        height="600"
                        alt=""
                        decoding="async"
                        fetchpriority="high">
                </div>
                <div class="row h-100 justify-content-center align-items-center home-hero-heading">
                    <h1 class="name">{{ site.owner }}</h1>
                    {% if site.tagline %}
                    <p class="home-tagline">{{ site.tagline }}</p>
                    {% endif %}
                </div>
            </section>
            <nav class="home-main-nav" aria-label="Site sections">
                <a href="{{ '/about' | relative_url }}" class="link home-nav-link">About</a>
                <a href="{{ '/blog/' | relative_url }}" class="link home-nav-link">Blog</a>
                <a href="{{ '/tutorials' | relative_url }}" class="link home-nav-link">Tutorials</a>
                <a href="{{ '/work' | relative_url }}" class="link home-nav-link">Work</a>
                <a href="{{ '/play/' | relative_url }}" class="link home-nav-link">Play</a>
            </nav>
            <div class="home-social-row">
                <a class="social-media link" title={{site.social.email}} href="mailto:{{site.social.email}}"
                    aria-hidden="true">
                    <i class="fa fa-envelope home-social-icon" aria-hidden="true"></i>
                </a>
                <a class="social-media link" title={{site.social.github}}
                    href="https://github.com/{{site.social.github}}">
                    <i class="fa fa-github home-social-icon" aria-hidden="true"></i>
                </a>
                <a class="social-media link" title={{site.social.linkedin}}
                    href="https://www.linkedin.com/in/{{site.social.linkedin}}/">
                    <i class="fa fa-linkedin-square home-social-icon" aria-hidden="true"></i>
                </a>
                {% if site.social.youtube %}
                <a class="social-media link" title="YouTube" href="{{ site.social.youtube }}">
                    <i class="fa fa-youtube-play home-social-icon" aria-hidden="true"></i>
                </a>
                {% endif %}
                <a class="social-media link" title={{site.social.yelp}}
                    href="https://{{site.social.yelp}}.yelp.ca">
                    <i class="fa fa-yelp home-social-icon" aria-hidden="true"></i>
                </a>
                <a class="social-media link" title={{site.social.tripadvisor}}
                    href="https://tripadvisor.com/{{site.social.tripadvisor}}">
                    <i class="fa fa-tripadvisor home-social-icon" aria-hidden="true"></i>
                </a>
            </div>
        </div>
    </main>
    <footer>
        <span>
            &copy; <time datetime="{{ site.time }}">{{ site.time | date: '%Y' }}</time> {{ site.author.name }}. Made with Jekyll using the <a href="https://github.com/chesterhow/tale/">Tale</a> theme by Chester How.
        </span>
    </footer>
</body>

</html>
