owner: William Granados
tagline: "CS & stats background — curious about people, motivated by the next problem worth digging into, and what to play next."
url: "https://wgma.ca"
baseurl: ""
title: William Granados
description: Personal site and blog of William Granados.

author:
  name: William Granados
  url: https://wgma.ca
  email: me@wgma.ca

# Build settings
markdown: kramdown

# Keep historical blog URLs stable under /blog/.
permalink: /blog/:year-:month-:day/:title

# Pagination
plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-seo-tag
paginate: 5
paginate_path: "/blog/page:num/"

# Assets
sass:
  sass_dir:     _sass
  style:        compressed
  silence_deprecations:
    - import

social:
    email: me@wgma.ca
    github: wgranados 
    linkedin: wlgranados
    youtube: "https://www.youtube.com/@wgmamoments/videos"
    yelp: wgma
    tripadvisor: Profile/wgma00
    stackoverflow: 5972611/wgma00

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
