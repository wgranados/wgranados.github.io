owner: William Granados
tagline: "Curious person, motivated by the next problem and adventure!"
url: "https://wgma.ca"
baseurl: ""
title: William Granados
description: Personal site and blog of William Granados.

author:
  name: William Granados
  url: https://wgma.ca
  email: me@wgma.ca

# Formspree: create a form at https://formspree.io/, verify your email, then paste the form id
# (the segment after /f/ in the form endpoint URL). Leave empty to show setup instructions only.
contact_form:
  formspree_id: "xlgoqawb"

# Build settings
markdown: kramdown

# Keep Pagefind’s static bundle when Jekyll regenerates `_site` (e.g. `jekyll serve`).
# Without this, every rebuild removes `_site/pagefind/` and `/pagefind/*.js` 404s until you re-run Pagefind.
keep_files:
  - pagefind

# Keep historical blog URLs stable under /blog/.
permalink: /blog/:year-:month-:day/:title

# Pagination
plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-sitemap
paginate: 5
paginate_path: "/blog/page:num/"

# Assets
sass:
  sass_dir:     _sass
  style:        compressed
  silence_deprecations:
    - import

social:
    email: me@wgma.ca
    github: wgranados
    linkedin: wlgranados
    youtube: "https://www.youtube.com/@wgmamoments/videos"
    yelp: wgma
    tripadvisor: Profile/wgma00
    stackoverflow: 5972611/wgma00

